name: cmp-cloud-dev

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cps}
      POSTGRES_USER: ${POSTGRES_USER:-cps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cps_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - cloud_dev

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cmp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cmp_dev_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-cmp}
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - cloud_dev

  valkey:
    image: valkey/valkey:9.1.0-alpine
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${VALKEY_PASSWORD:-valkey_dev_password}
    ports:
      - "127.0.0.1:${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a '${VALKEY_PASSWORD:-valkey_dev_password}' --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - cloud_dev

  cps-public:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CPS_ENVIRONMENT: development
      CPS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cps}:${POSTGRES_PASSWORD:-cps_dev_password}@postgres:5432/${POSTGRES_DB:-cps}
      CPS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-cmp}:${RABBITMQ_PASSWORD:-cmp_dev_password}@rabbitmq:5672/${RABBITMQ_VHOST:-cmp}
      CPS_CREDENTIAL_KEY_RING: ${CPS_CREDENTIAL_KEY_RING:-}
    command: ["cps", "serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:${CPS_PUBLIC_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - cloud_dev

  cps-internal:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CPS_ENVIRONMENT: development
      CPS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cps}:${POSTGRES_PASSWORD:-cps_dev_password}@postgres:5432/${POSTGRES_DB:-cps}
      CPS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-cmp}:${RABBITMQ_PASSWORD:-cmp_dev_password}@rabbitmq:5672/${RABBITMQ_VHOST:-cmp}
      CPS_CREDENTIAL_KEY_RING: ${CPS_CREDENTIAL_KEY_RING:-}
    command: ["cps", "serve", "--internal", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "127.0.0.1:${CPS_INTERNAL_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8002/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - cloud_dev

  cps-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CPS_ENVIRONMENT: development
      CPS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cps}:${POSTGRES_PASSWORD:-cps_dev_password}@postgres:5432/${POSTGRES_DB:-cps}
      CPS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-cmp}:${RABBITMQ_PASSWORD:-cmp_dev_password}@rabbitmq:5672/${RABBITMQ_VHOST:-cmp}
      CPS_CREDENTIAL_KEY_RING: ${CPS_CREDENTIAL_KEY_RING:-}
    command: ["cps", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cloud_dev

  ops-api:
    build:
      context: ../../../ops
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPS_ENVIRONMENT: development
      OPS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-cmp}:${RABBITMQ_PASSWORD:-cmp_dev_password}@rabbitmq:5672/${RABBITMQ_VHOST:-cmp}
      OPS_CPS_BASE_URL: http://cps-internal:8002
    command: ["ops", "serve", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "127.0.0.1:${OPS_API_PORT:-8001}:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      cps-internal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - cloud_dev

  ops-worker:
    build:
      context: ../../../ops
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OPS_ENVIRONMENT: development
      OPS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-cmp}:${RABBITMQ_PASSWORD:-cmp_dev_password}@rabbitmq:5672/${RABBITMQ_VHOST:-cmp}
      OPS_CPS_BASE_URL: http://cps-internal:8002
    command: ["ops", "worker"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      cps-internal:
        condition: service_healthy
    networks:
      - cloud_dev

networks:
  cloud_dev:
    name: cmp-cloud-dev
    driver: bridge

volumes:
  postgres_data:
    name: cmp-cloud-dev-postgres
  rabbitmq_data:
    name: cmp-cloud-dev-rabbitmq
  valkey_data:
    name: cmp-cloud-dev-valkey
